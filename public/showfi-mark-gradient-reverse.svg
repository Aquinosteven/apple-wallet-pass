<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ShowFi reverse gradient mark</title>
  <desc id="desc">ShowFi phone and pass mark in a blue gradient on a light background.</desc>
  <defs>
    <linearGradient id="showfi-gradient" x1="111" y1="70" x2="401" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061A3A" />
      <stop offset="0.46" stop-color="#116BFF" />
      <stop offset="1" stop-color="#24C8FF" />
    </linearGradient>
    <linearGradient id="showfi-soft-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F1F7FF" />
    </linearGradient>
    <mask id="ticket-cutouts">
      <rect width="512" height="512" fill="#FFFFFF" />
      <circle cx="0" cy="192" r="25" fill="#000000" />
      <circle cx="290" cy="192" r="25" fill="#000000" />
      <path d="M94 174h112M94 217h62" stroke="#000000" stroke-width="20" stroke-linecap="round" />
    </mask>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#showfi-soft-bg)" />
  <g transform="translate(111 70)">
    <rect x="43" y="0" width="204" height="360" rx="70" fill="none" stroke="url(#showfi-gradient)" stroke-width="28" />
    <path d="M110 0h70v22c0 10-8 18-18 18h-34c-10 0-18-8-18-18V0Z" fill="url(#showfi-gradient)" />
    <path d="M0 128h290v128H0V128Z" fill="url(#showfi-gradient)" mask="url(#ticket-cutouts)" />
    <rect x="112" y="309" width="66" height="16" rx="8" fill="url(#showfi-gradient)" opacity="0.72" />
  </g>
</svg>
